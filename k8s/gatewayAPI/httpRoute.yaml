apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-api-route
  namespace: default
spec:
  parentRefs:
  - name: prod-web-gateway          # Bind this route to the Gateway API
  hostnames:
  - "://mycompany.com"             # Only match traffic for this domain
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1                  # Matches requests starting with /v1
    backendRefs:
    - name: backend-service-v1      # Forward traffic to the v1 backend service
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /v2                  # Matches requests starting with /v2
    backendRefs:
    - name: backend-service-v2      # Forward traffic to the v2 backend service
      port: 8080
