apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: production
spec:
  type: NodePort
  selector:
    app: frontend-app
  ports:
    - protocol: TCP
      port: 80        # Port exposed inside the cluster
      targetPort: 80  # Port your container is listening on
      nodePort: 32000 # Optional: Specific external port (or let K8s assign one)
